<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#07111f">
    <title>Offline | Ruh Imperium</title>
    <style>
        :root {
            --dark: #07111f;
            --dark-2: #101e30;
            --gold: #d3b066;
            --gold-light: #f2d692;
            --cyan: #76f7ff;
            --cream: #f6f4ef;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, serif;
            color: var(--cream);
            background:
                radial-gradient(circle at top left, rgba(118,247,255,0.08), transparent 30%),
                linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 55%, #152746 100%);
        }
        .offline-card {
            width: min(100%, 560px);
            border-radius: 28px;
            padding: 32px 24px;
            border: 1px solid rgba(118,247,255,0.16);
            background: rgba(10, 22, 39, 0.82);
            box-shadow: 0 24px 60px rgba(3, 10, 20, 0.4);
            text-align: center;
        }
        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(118,247,255,0.22);
            color: var(--cyan);
            letter-spacing: 2px;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 18px;
        }
        h1 {
            margin: 0 0 12px;
            color: var(--gold-light);
            font-size: clamp(32px, 8vw, 54px);
            line-height: 1;
        }
        p {
            margin: 0 auto 18px;
            max-width: 420px;
            line-height: 1.7;
            color: rgba(246,244,239,0.8);
            font-size: 16px;
        }
        a {
            display: inline-block;
            margin-top: 8px;
            padding: 14px 22px;
            border-radius: 999px;
            color: var(--dark);
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <span class="badge">Offline Mode</span>
        <h1>Ruh Imperium</h1>
        <p>Your connection looks offline right now. The app shell is ready, and you can reload once your internet is back to continue shopping.</p>
        <a href="/">Retry Store</a>
    </div>
</body>
</html>
