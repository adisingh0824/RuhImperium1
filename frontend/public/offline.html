<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fbfaf6">
    <title>Offline | Raahi Parfums</title>
    <style>
        :root {
            --dark: #07111f;
            --dark-2: #101e30;
            --gold: #d3b066;
            --gold-light: #f2d692;
            --cyan: #76f7ff;
            --cream: #f6f4ef;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, serif;
            color: #2b211b;
            background:
                radial-gradient(circle at top left, rgba(163, 91, 47, 0.08), transparent 32%),
                linear-gradient(135deg, #fbfaf6 0%, #f3eee6 55%, #eef3f6 100%);
        }
        .offline-card {
            width: min(100%, 560px);
            border-radius: 28px;
            padding: 32px 24px;
            border: 1px solid rgba(163, 91, 47, 0.16);
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 24px 60px rgba(58, 44, 34, 0.12);
            text-align: center;
        }
        .offline-logo {
            width: min(220px, 70vw);
            height: auto;
            display: block;
            margin: 0 auto 20px;
            border-radius: 22px;
        }
        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(163, 91, 47, 0.22);
            color: #a35b2f;
            letter-spacing: 2px;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 18px;
        }
        h1 {
            margin: 0 0 12px;
            color: #2b211b;
            font-size: clamp(32px, 8vw, 54px);
            line-height: 1;
        }
        p {
            margin: 0 auto 18px;
            max-width: 420px;
            line-height: 1.7;
            color: rgba(43,33,27,0.72);
            font-size: 16px;
        }
        a {
            display: inline-block;
            margin-top: 8px;
            padding: 14px 22px;
            border-radius: 999px;
            color: #fffaf4;
            background: linear-gradient(135deg, #7b3f20 0%, #a35b2f 100%);
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <img class="offline-logo" src="/pwa-icons/ruh-logo-512.png" alt="Raahi Parfums logo">
        <span class="badge">Offline Mode</span>
        <h1>Raahi Parfums</h1>
        <p>Your connection looks offline right now. The app shell is ready, and you can reload once your internet is back to continue shopping.</p>
        <a href="/">Retry Store</a>
    </div>
</body>
</html>
