kind = "web"
previewPath = "/"
title = "Ruh Imperium"
version = "1.0.0"
id = "artifacts/ruh-imperium"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19502

[services.development]
run = "pnpm --filter @workspace/ruh-imperium run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ruh-imperium", "run", "build" ]
publicDir = "artifacts/ruh-imperium/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19502"
BASE_PATH = "/"
